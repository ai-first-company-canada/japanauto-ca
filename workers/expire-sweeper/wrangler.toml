# japanauto-expire-sweeper — the project's cron Worker (the name is historic;
# it now runs every scheduled job, dispatched by cron expression in src/index.ts):
#
#   "0 */6 * * *"  expire sweep — flips TTL-expired listings to 'expired'
#                  (second half of audit #8; public reads already filter).
#   "0 14 * * 1"   weekly dealer reports (decision 0016) — needs secrets:
#                    npx wrangler secret put RESEND_API_KEY
#                    npx wrangler secret put REPORTS_UNSUB_SECRET
#                  AND the same REPORTS_UNSUB_SECRET on the Pages project
#                  (set 2026-06-12 on both) — worker mints links, Pages verifies.
#   "30 14 1 * *"  monthly dealer reports (same secrets)
#   "45 9 * * *"   market-sync — pulls the scraper project's
#                  japanauto_market_stats Supabase view into D1 market_stats
#                  (Feature 1 step 3). URL is a [vars] entry below; auth is a
#                  Secret API key (the scraper project runs ES256 signing
#                  keys, so the originally-planned role-scoped HS256 JWT
#                  cannot validate there). No-op until the secret is set:
#                    npx wrangler secret put MARKET_SUPABASE_SECRET_KEY
#
# Pages Functions cannot run scheduled() handlers, hence a separate Worker.
# NOT deployed by the Pages `npm run deploy` — deploy separately:
#   cd workers/expire-sweeper && npx wrangler deploy

name = "japanauto-expire-sweeper"
main = "src/index.ts"
compatibility_date = "2026-06-01"
# Cron-only Worker with no fetch handler — no public workers.dev URL.
workers_dev = false

[triggers]
crons = ["0 */6 * * *", "45 9 * * *", "0 14 * * 1", "30 14 1 * *"]

[vars]
# The scraper project's Supabase URL — public knowledge (it's in every client
# request), so a var rather than a secret.
MARKET_SUPABASE_URL = "https://tgqyjuzutdbdqdrywlfv.supabase.co"

# CASL s.6(2) sender identification rendered in every report footer —
# replace with the exact legal name + MAILING address before first send.
REPORTS_SENDER_LINE = "japanauto.ca · Calgary, AB, Canada · support@japanauto.ca"

# Make scheduled-run logs visible in the dashboard (Workers → Logs).
[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "japanauto-prod"
database_id = "b0d65b95-2f43-403d-9237-0d4cac6e186a"
# `wrangler dev` talks to the real prod DB — the local simulator is empty and
# useless here, and the sweep is idempotent (only flips rows already past TTL).
remote = true
