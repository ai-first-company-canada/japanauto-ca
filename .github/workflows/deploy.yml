name: Deploy to Cloudflare Pages

# Deploy ONLY from main. Feature/fix branches must NOT auto-deploy: a Pages
# preview deployment's Functions bind the PRODUCTION D1/KV/R2 (bindings are
# declared at wrangler.toml top level, not per-environment) and the public
# *.pages.dev host exposes unauthenticated prod-D1 write paths (track-contact)
# — so shipping an arbitrary branch to a public preview URL is a prod-write
# surface (deep-audit 2026-07-05, OPS-1). Use workflow_dispatch for an
# intentional one-off branch deploy.
on:
  push:
    branches:
      - main
  # Scheduled catalog refresh (deep-audit ADV-1): the browse/city/model pages
  # are a build-time snapshot of prod D1 (catalog-live.json). Without a rebuild
  # a dealer's newly-active listing is live on its detail page + IndexNow-pinged
  # but ORPHANED from every browse page and count until someone redeploys. This
  # cron re-exports from D1 and redeploys so browse inventory tracks D1 within
  # the interval (detail pages are already instant). Tune the cadence to stay
  # under the Pages deploy budget; 3h ≈ 240 runs/month.
  schedule:
    - cron: '17 */3 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      # Unit tests (WS-5): pure-unit vitest suite over validators, entitlements,
      # Stripe signature verification and rate-limit key formats. Runs on the
      # 3-hourly scheduled redeploy too — a regression from any merge is caught
      # by the next cron at the cost of ~10s CI.
      - name: Unit tests
        run: npm test

      # Refresh catalog-live.json from prod D1 so the SSG browse pages + counts
      # reflect current inventory (deep-audit ADV-1). Fail-safe: if the deploy
      # token lacks D1:read (or D1 is unreachable), keep the committed snapshot
      # and warn — a stale-but-honest catalog beats a broken deploy. The token
      # needs `D1:read` on japanauto-prod for this to take effect.
      - name: Refresh catalog from D1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/export-catalog-data.mjs || echo "::warning::catalog export from D1 failed — building from the committed catalog-live.json snapshot"

      # Migration journal drift check (deep-audit OPS-3). Non-blocking here —
      # a schema drift must not kill the 3-hourly catalog redeploy; the local
      # `npm run deploy` predeploy runs the same script BLOCKING.
      - name: Migration journal drift check
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: node scripts/check-migrations-journal.mjs || echo "::warning::D1 migration journal drift — see docs/runbook.md (migration procedure)"

      - name: Build
        run: npm run build

      # The SEO/GEO gate that `npm run deploy` runs locally via the `predeploy`
      # lifecycle hook. wrangler-action calls `pages deploy` directly, bypassing
      # that hook, so without this step CI could ship SEO-broken HTML that a
      # local deploy would have rejected (audit #19).
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: SEO audit gate
        run: npm run audit:seo

      # Launch gate (checklist №19 second half): attaching japanauto.ca opens
      # indexing — CI must refuse to ship fabricated content or a closed
      # robots.txt, exactly like a local `npm run deploy` would.
      - name: Launch audit gate
        run: npm run audit:launch

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        # Pass the branch name via env, not by interpolating ${{ github.ref_name }}
        # directly into the shell command (audit #37): a branch named e.g.
        # `fix/x$(...)` would otherwise be spliced into the command string and
        # executed on the runner, which holds the CLOUDFLARE_* secrets.
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=japanauto --branch="$DEPLOY_BRANCH"

      # Cron heartbeat staleness check (deep-audit OPS-4). AFTER the deploy so
      # a stale heartbeat never blocks the catalog redeploy — but it reddens
      # the run, and a failed SCHEDULED workflow makes GitHub email the owner.
      # Detection latency ≤ the 3h schedule cadence.
      - name: Cron heartbeat check
        if: always()
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            node scripts/check-cron-heartbeats.mjs
          else
            node scripts/check-cron-heartbeats.mjs || echo "::warning::cron heartbeat check failed"
          fi
