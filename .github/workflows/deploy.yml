name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'fix/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # The SEO/GEO gate that `npm run deploy` runs locally via the `predeploy`
      # lifecycle hook. wrangler-action calls `pages deploy` directly, bypassing
      # that hook, so without this step CI could ship SEO-broken HTML that a
      # local deploy would have rejected (audit #19).
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: SEO audit gate
        run: npm run audit:seo

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        # Pass the branch name via env, not by interpolating ${{ github.ref_name }}
        # directly into the shell command (audit #37): a branch named e.g.
        # `fix/x$(...)` would otherwise be spliced into the command string and
        # executed on the runner, which holds the CLOUDFLARE_* secrets.
        env:
          DEPLOY_BRANCH: ${{ github.ref_name }}
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=japanauto --branch="$DEPLOY_BRANCH"
